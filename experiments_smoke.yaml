scheduler:
  max_parallel: 1
  seed: 42
experiments:
  - name: smoke_train_ok
    type: train
    model: yolov5s
    dataset: data/CrackDetection_Augmentation.v1.yolov5pytorch
    epochs: 1
    batch_size: 2
    input_size: 320
    output_dir: output/scheduler_smoke/train_ok
    device: cuda
    num_workers: 0
    seed: 42
  - name: smoke_train_bad_model
    type: train
    model: yolov5s_nonexistent
    dataset: data/CrackDetection_Augmentation.v1.yolov5pytorch
    epochs: 1
    batch_size: 2
    input_size: 320
    output_dir: output/scheduler_smoke/train_bad
    device: cuda
    num_workers: 0
    seed: 42
  - name: smoke_test_ok
    type: test
    model: yolov5s
    weights: output/smoke_train/best.pt
    dataset: data/CrackDetection_Augmentation.v1.yolov5pytorch
    split: test
    output_dir: output/scheduler_smoke/test_ok
    batch_size: 2
    input_size: 320
    device: cuda
    num_workers: 0
