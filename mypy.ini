[mypy]
python_version = 3.11
files = cracks_yolo, tests

strict = True

disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_calls = True
disallow_any_generics = True

warn_unused_ignores = False
warn_return_any = False
warn_unreachable = True
show_error_codes = True

ignore_missing_imports = True

# torch's stubs are conservative: nn.ModuleList/Sequential __getitem__ returns
# Tensor | Module, BatchNorm2d.running_mean is Tensor | None, etc. We rely on
# runtime invariants (only Conv2d/Sequential-of-Conv2d stored in these lists)
# that mypy can't see. Disable the resulting strict checks for ops code; our
# own function signatures, docstrings, and public APIs remain fully annotated.
[mypy-cracks_yolo.ops.*]
disallow_untyped_defs = True
no_implicit_optional = True
warn_return_any = False

[mypy-torch.*]
disallow_subclassing_any = False

[mypy-torch.nn.*]
disallow_subclassing_any = False

[mypy-torch.nn.functional.*]
