# experiments/all_models_cv5.yaml — 26-model 5-fold cross-validation sweep
# for tongue surface crack detection.
#
# Each model runs ONE experiment: --cross-val merges train+valid+test into
# one pool, StratifiedKFold partitions it into 5 folds. Per fold: held-out
# fold = TEST, remaining records split into train (90%) + val (10%,
# val_fraction=0.1). The held-out fold is tested against best.pt (reloaded
# after training, not the final-epoch weights).
#
# Per-model tiered epochs (small YOLO 400, medium 300, large 250, torchvision
# 150) with early stopping. YOLO lr=1e-3 + clip_grad_norm=10.0; torchvision
# lr=1e-4. 26 models x 5 folds; reduce epochs for faster sweeps.
#
# Usage:
#   python -m scripts.schedule_experiments \
#       --config experiments/all_models_cv5.yaml \
#       --output-dir output/all_models_cv5
scheduler:
  max_parallel: 1
  seed: 42
dataset: &dataset data/CrackDetection_Augmentation.v1.yolov5pytorch
common: &common
  input_size: 640
  device: cuda
  seed: 42
  num_workers: 8
  pretrained: true
  cross_val: true
  n_folds: 5
  val_fraction: 0.1
  clip_grad_norm: 10.0
experiments:
  - name: yolov5s_cv
    type: train
    model: yolov5s
    dataset: *dataset
    batch_size: 64
    lr: 0.001
    epochs: 400
    early_stopping_patience: 30
    output_dir: output/yolov5s_cv
    no_amp: true
    !!merge <<: *common
  - name: yolov5s_sac_cv
    type: train
    model: yolov5s_sac
    dataset: *dataset
    batch_size: 64
    lr: 0.001
    epochs: 400
    early_stopping_patience: 30
    output_dir: output/yolov5s_sac_cv
    no_amp: true
    !!merge <<: *common
