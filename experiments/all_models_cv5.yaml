# experiments/all_models_cv5.yaml — 26-model 5-fold cross-validation sweep
# for tongue surface crack detection.
#
# Each model runs ONE experiment: --cross-val merges the train+valid+test
# splits into one pool, StratifiedKFold partitions it into 5 folds. Per
# fold: held-out fold = TEST, remaining records split into train (90%) +
# val (10%, val_fraction=0.1, used for backprop validation during
# training). The final cv_summary.csv aggregates mean ± std across folds.
#
# 26 models × 5 folds × ~2.5 h/fold ≈ 325 h on a single GPU. Reduce
# --epochs for faster sweeps. Multi-GPU via scheduler.max_parallel +
# per-experiment CUDA_VISIBLE_DEVICES env overrides (see
# all_models_direct.yaml header).
#
# Usage:
#   python -m scripts.schedule_experiments \
#       --config experiments/all_models_cv5.yaml \
#       --output-dir output/all_models_cv5
scheduler:
  max_parallel: 1
  seed: 42
# Fixed dataset. CV mode merges ALL splits (train+valid+test) — the

# original split is ignored.
dataset: &dataset data/CrackDetection_Augmentation.v1.yolov5pytorch
# Common knobs. 100 epochs ≈ 2-3 h per fold on a single GPU.

common: &common
  epochs: 100
  input_size: 640
  device: cuda
  seed: 42
  num_workers: 8
  pretrained: true
  cross_val: true
  n_folds: 5
  val_fraction: 0.1
experiments:
  # ===== YOLOv5 family (4 models) =====
  - name: yolov5s_baseline_cv
    type: train
    model: yolov5s
    dataset: *dataset
    batch_size: 64
    lr: 0.01
    output_dir: output/yolov5s_baseline_cv
    !!merge <<: *common
  - name: yolov5s_sac_cv
    type: train
    model: yolov5s_sac
    dataset: *dataset
    batch_size: 64
    lr: 0.01
    output_dir: output/yolov5s_sac_cv
    !!merge <<: *common
  - name: yolov5s_tr_cv
    type: train
    model: yolov5s_tr
    dataset: *dataset
    batch_size: 64
    lr: 0.01
    output_dir: output/yolov5s_tr_cv
    !!merge <<: *common
  - name: yolov5s_sactr_cv
    type: train
    model: yolov5s_sactr
    dataset: *dataset
    batch_size: 64
    lr: 0.01
    output_dir: output/yolov5s_sactr_cv
    !!merge <<: *common
  - name: yolov7w_baseline_cv
    # ===== YOLOv7 family (2 models) =====

    type: train
    model: yolov7w
    dataset: *dataset
    batch_size: 32
    lr: 0.01
    output_dir: output/yolov7w_baseline_cv
    !!merge <<: *common
  - name: yolov7w_sac_cv
    type: train
    model: yolov7w_sac
    dataset: *dataset
    batch_size: 32
    lr: 0.01
    output_dir: output/yolov7w_sac_cv
