scheduler:
  max_parallel: 1
  seed: 42
experiments:
- name: yolov5s_sac_train
  type: train
  model: yolov5s_sac
  dataset: data/CrackDetection_Augmentation.v1.yolov5pytorch
  output_dir: output/yolov5s_sac
  epochs: 1200
  batch_size: 64
  lr: 0.001
  input_size: 640
  device: cuda
  seed: 42
  num_workers: 16
  pretrained: true
  clip_grad_norm: 10.0
  early_stopping_patience: 30
  cosine_lr: true
  use_ema: true
  optimizer: sgd
  no_amp: true
- name: yolov5s_sac_test
  type: test
  model: yolov5s_sac
  weights: output/yolov5s_sac/best.pt
  dataset: data/CrackDetection_Augmentation.v1.yolov5pytorch
  split: test
  output_dir: output/yolov5s_sac/test
  batch_size: 64
  input_size: 640
  device: cuda
  num_workers: 16
