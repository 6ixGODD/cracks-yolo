scheduler:
  max_parallel: 1
  seed: 42
experiments:
- name: yolov5s_sactr_train
  type: train
  model: yolov5s_sactr
  dataset: data/CrackDetection_Augmentation.v1.yolov5pytorch
  output_dir: output/yolov5s_sactr
  epochs: 1200
  batch_size: 64
  lr: 0.001
  input_size: 640
  device: cuda
  seed: 42
  num_workers: 16
  pretrained: true
  clip_grad_norm: 10.0
  early_stopping_patience: 30
  cosine_lr: true
  use_ema: true
  optimizer: sgd
  no_amp: true
- name: yolov5s_sactr_test
  type: test
  model: yolov5s_sactr
  weights: output/yolov5s_sactr/best.pt
  dataset: data/CrackDetection_Augmentation.v1.yolov5pytorch
  split: test
  output_dir: output/yolov5s_sactr/test
  batch_size: 64
  input_size: 640
  device: cuda
  num_workers: 16
