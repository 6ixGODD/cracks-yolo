# experiments/all_models_direct.yaml — 26-model direct train->test sweep for
# tongue surface crack detection.
#
# Each model produces TWO experiments: (1) train on the train split with
# validation on the valid split, (2) test best.pt on the held-out test split.
# 26 models x 2 = 52 experiments.
#
# Per-model tiered epochs (small YOLO 400, medium 300, large 250, torchvision
# 150) with early stopping (YOLO patience 30, torchvision 20). YOLO lr=1e-3 +
# clip_grad_norm=10.0 (lr=0.01 + AMP diverges to NaN); torchvision lr=1e-4.
# Batch sizes tuned for a single high-VRAM GPU; halve on OOM.
#
# Single-GPU usage:
#   uv sync
#   uv pip install torch==2.5.1 torchvision==0.20.1 \
#       --index-url https://download.pytorch.org/whl/cu118
#   python -m scripts.schedule_experiments \
#       --config experiments/all_models_direct.yaml \
#       --output-dir output/all_models_direct
#
# Multi-GPU: set scheduler.max_parallel to the GPU count and add
#   env: {CUDA_VISIBLE_DEVICES: "N"}
# to each experiment. Retry failures:
#   python -m scripts.schedule_experiments \
#       --retry-failed output/all_models_direct/scheduler/errors.jsonl \
#       --output-dir output/all_models_direct_retry
scheduler:
  max_parallel: 1
  seed: 42
dataset: &dataset data/CrackDetection_Augmentation.v1.yolov5pytorch
common: &common
  input_size: 640
  device: cuda
  seed: 42
  num_workers: 8
  pretrained: true
  clip_grad_norm: 10.0
experiments:
  - name: yolov5s_train
    type: train
    model: yolov5s
    dataset: *dataset
    batch_size: 64
    lr: 0.001
    epochs: 400
    early_stopping_patience: 30
    output_dir: output/yolov5s
    no_amp: true
    !!merge <<: *common
  - name: yolov5s_test
    type: test
    model: yolov5s
    weights: output/yolov5s/best.pt
    dataset: *dataset
    split: test
    output_dir: output/yolov5s/test
    batch_size: 64
    input_size: 640
    device: cuda
    num_workers: 8
  - name: yolov5s_sac_train
    type: train
    model: yolov5s_sac
    dataset: *dataset
    batch_size: 64
