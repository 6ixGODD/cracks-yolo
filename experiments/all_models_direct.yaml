# experiments/all_models_direct.yaml — 26-model direct train→test sweep for
# tongue surface crack detection.
#
# Each model produces TWO experiments: (1) train on the train split with
# validation on the valid split, (2) test the resulting best.pt on the
# held-out test split. 26 models × 2 = 52 experiments.
#
# Batch sizes below are tuned for a single high-VRAM GPU. If a run OOMs,
# halve the batch_size and retry.
#
# Single-GPU usage (max_parallel=1):
#   uv sync
#   uv pip install torch==2.5.1 torchvision==0.20.1 \
#       --index-url https://download.pytorch.org/whl/cu118
#   python -m scripts.schedule_experiments \
#       --config experiments/all_models_direct.yaml \
#       --output-dir output/all_models_direct
#
# Multi-GPU usage (one GPU per experiment):
#   Set scheduler.max_parallel to the GPU count and add
#     env: {CUDA_VISIBLE_DEVICES: "N"}
#   to each experiment (N = 0/1/2/...). Batch sizes can then be reduced
#   proportionally.
#
# After the sweep finishes, retry any failures:
#   python -m scripts.schedule_experiments \
#       --retry-failed output/all_models_direct/scheduler/errors.jsonl \
#       --output-dir output/all_models_direct_retry
scheduler:
  max_parallel: 1
  seed: 42
# Dataset path is fixed across all experiments. YOLOv5 PyTorch format is

# read directly by YOLOSource (no COCO conversion needed).
dataset: &dataset data/CrackDetection_Augmentation.v1.yolov5pytorch
# Common training knobs. 100 epochs ≈ 2-3 h per model on a single GPU.

# 26 models × ~2.5 h ≈ 65 h total. Reduce --epochs for faster sweeps.
common: &common
  epochs: 100
  input_size: 640
  device: cuda
  seed: 42
  num_workers: 8
  pretrained: true
experiments:
  # ===== YOLOv5 family (4 models) =====
  - name: yolov5s_baseline_train
    type: train
    model: yolov5s
    dataset: *dataset
    batch_size: 64
    lr: 0.01
    output_dir: output/yolov5s_baseline
    !!merge <<: *common
  - name: yolov5s_baseline_test
    type: test
    model: yolov5s
    weights: output/yolov5s_baseline/best.pt
    dataset: *dataset
    split: test
    batch_size: 64
    input_size: 640
    device: cuda
    num_workers: 8
  - name: yolov5s_sac_train
    type: train
    model: yolov5s_sac
    dataset: *dataset
    batch_size: 64
    lr: 0.01
    output_dir: output/yolov5s_sac
